<!DOCTYPE html>

<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salon Registration | Smart Salon</title>

<style>
body{
font-family:'Segoe UI',Arial,sans-serif;
background:#121212;
color:white;
text-align:center;
margin:0;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
}

.reg-card{
background:#1e1e1e;
padding:40px;
width:400px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

h2{
color:#2ecc71;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #333;
background:#252525;
color:white;
box-sizing:border-box;
}

input:focus{
border-color:#2ecc71;
outline:none;
}

.btn-loc{
background:#f1c40f;
color:black;
font-weight:bold;
cursor:pointer;
border:none;
padding:12px;
width:100%;
border-radius:8px;
margin:10px 0;
transition:0.3s;
}

.btn-loc:hover{
background:#d4ac0d;
}

.btn-submit{
background:#2ecc71;
color:white;
cursor:pointer;
width:100%;
padding:15px;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
margin-top:10px;
transition:0.3s;
}

.btn-submit:hover{
background:#27ae60;
transform:translateY(-2px);
}

#loc-status{
font-size:13px;
color:#f1c40f;
margin-bottom:10px;
font-weight:bold;
}

.loader{
border:4px solid #333;
border-top:4px solid #2ecc71;
border-radius:50%;
width:30px;
height:30px;
animation:spin 1s linear infinite;
display:inline-block;
margin-top:20px;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}
</style>

</head>

<body>

<div class="reg-card" id="reg-form">

<h2>নতুন সেলুন নিবন্ধন</h2>
<p style="color:#aaa;font-size:14px;margin-bottom:20px;">
আপনার দোকানের তথ্য দিয়ে ফর্মটি পূরণ করুন
</p>

<input type="text" id="owner_name" placeholder="আপনার নাম (Owner Name)">
<input type="email" id="email" placeholder="ইমেইল (Email)">
<input type="password" id="password" placeholder="পাসওয়ার্ড (Password)">
<input type="text" id="salon_name" placeholder="দোকানের নাম (Salon Name)">
<input type="text" id="phone" placeholder="ফোন নাম্বার (Phone)">

<p style="font-size:12px;color:#888;margin-top:10px;">
দোকানের লোকেশন সেট করতে নিচে ক্লিক করুন
</p>

<button class="btn-loc" onclick="getLocation()">📍 সেট মাই শপ লোকেশন</button>

<div id="loc-status">লোকেশন এখনো সেট করা হয়নি</div>

<button class="btn-submit" onclick="submitRegistration()">
নিবন্ধন সম্পন্ন করুন
</button>

</div>

<script>

let lat=null;
let lon=null;

function getLocation(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition((pos)=>{

lat=pos.coords.latitude;
lon=pos.coords.longitude;

document.getElementById('loc-status').innerHTML=
`✅ লোকেশন সেট হয়েছে: ${lat.toFixed(4)}, ${lon.toFixed(4)}`;

},()=>{

alert("লোকেশন পাওয়া যায়নি। ব্রাউজার পারমিশন চেক করুন।");

});

}else{

alert("জিপিএস সাপোর্ট করে না।");

}

}

async function submitRegistration(){

const ownerName=document.getElementById('owner_name').value;
const email=document.getElementById('email').value;
const password=document.getElementById('password').value;
const salonName=document.getElementById('salon_name').value;
const phone=document.getElementById('phone').value;

if(!ownerName||!email||!password||!salonName||!phone)
return alert("দয়া করে সব ঘর পূরণ করুন!");

if(!lat||!lon)
return alert("দয়া করে আগে দোকানের লোকেশন সেট করুন!");

const data={
owner_name:ownerName,
email:email,
password:password,
salon_name:salonName,
phone:phone,
latitude:lat,
longitude:lon
};

try{

const res=await fetch('http://127.0.0.1:8000/owner/register',{

method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify(data)

});

if(res.ok){

document.getElementById('reg-form').innerHTML=`
<div style="text-align:center;">
<div style="font-size:60px;margin-bottom:20px;">✅</div>
<h2 style="color:#2ecc71;">নিবন্ধন সফল হয়েছে!</h2>
<p>আপনার স্মার্ট সেলুন প্রোফাইল এখন লাইভ।</p>
<p style="color:#aaa;font-size:14px;">
অপেক্ষা করুন, আপনাকে ড্যাশবোর্ডে নিয়ে যাওয়া হচ্ছে...
</p>
<div class="loader"></div>
</div>
`;

setTimeout(()=>{

window.location.href="admin.html";

},3000);

}else{

const errData=await res.json();
alert("ভুল: "+(errData.detail||"নিবন্ধনে সমস্যা হয়েছে"));

}

}catch(error){

console.error(error);

alert("সার্ভার কানেকশন এরর! নিশ্চিত করুন FastAPI server চলছে।");

}

}

</script>

</body>
</html>
